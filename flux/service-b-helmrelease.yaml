apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: service-b
  namespace: default
spec:
  chart:
    spec:
      chart: service-b
      sourceRef:
        kind: GitRepository
        name: repo
        namespace: flux-system
  interval: 5m
  values:
    replicaCount: 1
    image:
      repository: registry.example.com/service-b
      tag: latest
